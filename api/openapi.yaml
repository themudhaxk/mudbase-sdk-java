      operationId: functions.triggerWebhook
      parameters:
      - description: Project ID.
        explode: false
        in: path
        name: projectId
        required: true
        schema:
          format: objectid
          type: string
        style: simple
      - description: Optional webhook secret for verification
        explode: false
        in: header
        name: X-Webhook-Secret
        required: false
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              description: Payload sent to triggered functions
              type: object
          application/x-www-form-urlencoded:
            schema:
              type: object
          text/plain:
            schema:
              type: string
        description: Payload sent to the triggered function(s).
      responses:
        "200":
          content:
            application/json:
              examples:
                success:
                  summary: Successful trigger
                  value:
                    success: true
                    triggered: 2
                    results:
                    - functionId: 685af8b85d73a104065b6a77
                      success: true
                      result:
                        processed: true
                      executionTime: 45
                    - functionId: 685af8b85d73a104065b6a78
                      success: true
                      result:
                        processed: true
                      executionTime: 32
                noFunctions:
                  summary: No matching functions
                  value:
                    success: true
                    triggered: 0
                    results: []
              schema:
                $ref: "#/components/schemas/functions_triggerWebhook_200_response"
          description: Functions triggered successfully
        "400":
          content:
