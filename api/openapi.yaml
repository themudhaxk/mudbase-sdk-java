          type: string
        satPerVb:
          description: (UTXO only) Satoshis per virtual byte
          type: integer
        feeSat:
          description: (UTXO only) Estimated fee in satoshis
          type: integer
        lamports:
          description: (Solana only) Fee in lamports
          type: integer
      type: object
