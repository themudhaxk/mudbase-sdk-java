        newPassword: newPassword
        currentPassword: currentPassword
      properties:
        currentPassword:
          type: string
        newPassword:
          minLength: 8
          type: string
      required:
      - currentPassword
      - newPassword
      type: object
    TwoFASetupResponse:
      description: "2FA setup data (secret, QR code URL, manual entry key)."
      example:
        manualEntryKey: manualEntryKey
        qrCode: qrCode
        secret: secret
      properties:
        secret:
          type: string
        qrCode:
          type: string
        manualEntryKey:
          type: string
      type: object
    Organization:
      description: "Organization (org) entity with plan, usage, limits, and billing."
      properties:
        _id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        logo:
          description: Optional logo URL. Org-related emails use the platform logo
            (env); this field is for legacy or future UI use only.
          format: uri
          type: string
        website:
          type: string
        plan:
          $ref: "#/components/schemas/Plan"
        usage:
          $ref: "#/components/schemas/Usage"
        limits:
          $ref: "#/components/schemas/Limits"
        billing:
          $ref: "#/components/schemas/Billing"
        settings:
          type: object
        createdAt:
          format: date-time
          type: string
        updatedAt:
          format: date-time
          type: string
      type: object
    OrganizationSummary:
      description: "Short organization reference (id, name, slug)."
      example:
        name: name
        _id: _id
        slug: slug
      properties:
        _id:
          type: string
        name:
          type: string
        slug:
          type: string
      type: object
    UpdateOrganizationRequest:
      description: "Fields to update on an organization (name, description, logo,\
        \ website, settings)."
      properties:
        name:
          type: string
        description:
          type: string
        logo:
          description: Optional logo URL. Not used for emails (org emails use platform
            logo).
          format: uri
          type: string
        website:
          type: string
        settings:
          type: object
      type: object
    InviteMemberRequest:
      description: Email and role for inviting a member to an organization.
      properties:
        email:
          format: email
          type: string
        role:
          enum:
          - admin
          - member
          - viewer
          type: string
      required:
      - email
      - role
      type: object
    Plan:
      description: "Subscription plan (name, price, currency, interval, features)."
      example:
        features:
        - features
        - features
        price: 0.8008281904610115
        name: name
        currency: currency
        interval: interval
      properties:
        name:
          type: string
        price:
          type: number
        currency:
          type: string
        interval:
          type: string
        features:
          items:
            type: string
          type: array
      type: object
    Usage:
      description: "Usage counts (projects, users, storage, bandwidth, apiCalls, dbReads,\
        \ dbWrites)."
      properties:
        projects:
          type: integer
        users:
          type: integer
        storage:
          type: integer
        bandwidth:
          type: integer
        apiCalls:
          type: integer
        dbReads:
          type: integer
        dbWrites:
          type: integer
      type: object
    Limits:
      description: "Limit values for plan (projects, users, storage, etc.)."
      properties:
        projects:
          type: integer
        users:
          type: integer
        storage:
          type: integer
        bandwidth:
          type: integer
        apiCalls:
          type: integer
        dbReads:
          type: integer
        dbWrites:
          type: integer
      type: object
    Billing:
      description: "Billing info (next billing date, payment method, last payment)."
      properties:
        nextBillingDate:
          format: date-time
          type: string
        paymentMethod:
          type: string
        lastPayment:
          $ref: "#/components/schemas/Billing_lastPayment"
      type: object
    UsageResponse:
      description: "Response containing usage, limits, plan, and billing."
      properties:
        usage:
          $ref: "#/components/schemas/Usage"
        limits:
          $ref: "#/components/schemas/Limits"
        plan:
          $ref: "#/components/schemas/Plan"
        billing:
          $ref: "#/components/schemas/Billing"
      type: object
    Project:
      description: "Project entity (id, name, config, usage)."
      properties:
        _id:
          type: string
        name:
          type: string
        description:
          type: string
        slug:
          type: string
        org:
          type: string
        auth:
          $ref: "#/components/schemas/AuthConfig"
        database:
          $ref: "#/components/schemas/DatabaseConfig"
        storage:
          $ref: "#/components/schemas/StorageConfig"
        settings:
          $ref: "#/components/schemas/ProjectSettings"
        usage:
          $ref: "#/components/schemas/ProjectUsage"
        createdAt:
          format: date-time
          type: string
        updatedAt:
          format: date-time
          type: string
      type: object
    ProjectSettings:
      description: |
        Project-level settings. Toggles for verification and default user status apply to app and role-based signup.
      properties:
        allowAnonymousAuth:
          default: true
          description: Allow anonymous (unauthenticated) users
          type: boolean
        requireEmailVerification:
          default: true
          description: "When true, users who sign up with email do not receive a token\
            \ until they verify their email; login is blocked until verified."
          type: boolean
        requirePhoneVerification:
          default: false
          description: "When true, users who sign in with phone (e.g. OTP) must have\
            \ verified their phone before receiving a token."
          type: boolean
        defaultUserAccountStatus:
          default: active
          description: |
            Default account status for new signups. **active** = user can use the app immediately.
            **pending** = user must be approved by an org owner/admin (PATCH org user status to active) before they can perform protected operations.
          enum:
          - pending
          - active
          type: string
        enableRealtime:
          default: true
          type: boolean
        enableStorage:
          default: true
          type: boolean
        enableFunctions:
          default: false
          type: boolean
      type: object
    CreateProjectRequest:
      description: |
        Project settings (requireEmailVerification, requirePhoneVerification, defaultUserAccountStatus) are not accepted on create; use PATCH to update settings after creation.
      properties:
        name:
          example: Mudbase Platform
          type: string
        description:
          example: Main platform for Mudbase services
          type: string
        slug:
          example: mudbase-platform
          type: string
      required:
      - name
      type: object
    UpdateProjectRequest:
      description: "Fields to update on a project (name, description, logoUrl, settings,\
        \ auth)."
      properties:
        name:
          example: Mudbase Platform
          type: string
        description:
          example: Main platform for Mudbase services
          type: string
        logoUrl:
          description: |
            Public URL for the project logo/brand image. Prefer uploading via **POST /api/projects/{id}/logo** or **POST /api/projects/{orgId}/projects/{id}/logo** (stored under logo/project/ in platform storage). Used in project-related emails.
          format: uri
          type: string
        settings:
          $ref: "#/components/schemas/ProjectSettings"
        auth:
          $ref: "#/components/schemas/AuthConfig"
      type: object
    AuthConfig:
      description: "Project auth configuration (providers, notifyOnNewSignIn)."
      properties:
        providers:
          items:
            $ref: "#/components/schemas/AuthProvider"
          type: array
        notifyOnNewSignIn:
          default: false
          description: |
            When true, a "new sign-in detected" email is sent to the user on each app sign-in (local or OAuth).
            Counts against the org's messaging/email plan quota. Default false. Organization-based sign-in always sends this email (no quota deduction).
          type: boolean
      type: object
    AuthProvider:
      description: "Single auth provider (name, enabled, config)."
      properties:
        name:
          type: string
        enabled:
          type: boolean
        config:
          type: object
      type: object
    DatabaseConfig:
      description: Database configuration (collections list).
      properties:
        collections:
          items:
            type: string
          type: array
      type: object
    StorageConfig:
      description: Storage configuration (buckets list).
      properties:
        buckets:
          items:
            type: string
          type: array
      type: object
    ProjectUsage:
      description: "Project usage counts (apiCalls, storage, bandwidth, dbReads, dbWrites)."
      example:
        dbReads: 5
        bandwidth: 1
        dbWrites: 5
        storage: 6
        apiCalls: 0
      properties:
        apiCalls:
          type: integer
        storage:
          type: integer
        bandwidth:
          type: integer
        dbReads:
          type: integer
        dbWrites:
          type: integer
      type: object
    ProjectUsageResponse:
      description: Response with project usage and limits.
      properties:
        usage:
          $ref: "#/components/schemas/ProjectUsage"
        limits:
          $ref: "#/components/schemas/Limits"
      type: object
    Collection:
