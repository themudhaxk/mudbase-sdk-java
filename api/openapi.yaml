        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            examples:
              documentCreate:
                summary: Simulate document create
                value:
                  trigger:
                    type: document
                    event: create
                  eventContext:
                    document:
                      _id: 685ae1210136e73fa1dcaf36
                      collectionId: 685ada8fd9416ac02f171abf
                      data:
                        name: John
                        email: john@example.com
              webhookPayload:
                summary: Simulate webhook
                value:
                  trigger:
                    type: webhook
                    event: received
                  eventContext:
                    webhook:
                      headers:
                        content-type: application/json
                      body:
                        event: payment.completed
                        amount: 99.99
              fileUploaded:
                summary: Simulate file uploaded event
                value:
                  trigger:
                    type: file
                    event: uploaded
                  eventContext:
                    file:
                      fileId: file_abc123
                      bucket: default
                      url: https://cdn.example.com/project/default/file_abc123.jpg
                      originalName: photo.jpg
                      mimeType: image/jpeg
                      size: 345678
              walletTransaction:
                summary: Simulate wallet transaction event
                value:
                  trigger:
                    type: wallet
                    event: tx
                  eventContext:
                    wallet:
                      walletId: w_123
                      address: 0xabc...
                      chain: ethereum
                      txHash: 0xdeadbeef...
                      transaction:
                        amount: 0.75
                        currency: ETH
              cronRun:
                summary: Simulate cron schedule
                value:
                  trigger:
                    type: cron
                    schedule: daily
                  eventContext:
                    cron:
                      schedule: daily
                      at: 2024-01-15T00:00:00.000Z
              messagingSent:
                summary: Simulate messaging event
                value:
                  trigger:
                    type: messaging
                    event: sent
                  eventContext:
                    message:
                      messageId: msg_123
                      senderId: user_123
                      chatId: chat_456
                      content:
                        text: Hello
            schema:
              $ref: "#/components/schemas/functions_simulate_request"
        description: "Simulated trigger (type, event) and eventContext (document,\
          \ file, webhook, wallet, message, or cron). Merged into the function payload\
          \ for testing."
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FunctionExecutionResponse"
          description: Simulation result
        "400":
          content:
            application/json:
              example:
                error: Validation failed
                details:
                  email: Email is required
                  password: Password must be at least 8 characters
              schema:
                $ref: "#/components/schemas/Error"
          description: |
            Bad request or validation error. The **error** field contains the exact backend message, e.g. "Validation failed", "projectId is required", "No file provided", "Invalid project ID format". **details** may contain validation errors when present.
        "401":
          content:
            application/json:
              example:
                error: Invalid token.
              schema:
                $ref: "#/components/schemas/Error"
          description: |
            Not authenticated. The **error** field contains the exact backend message, e.g. "Invalid token.", "Access denied. No token provided.", "Authentication required", "Invalid API key", "API key expired".
        "403":
          content:
            application/json:
              example:
                error: Access denied
              schema:
                $ref: "#/components/schemas/Error"
          description: |
            Access denied. The **error** field contains the exact backend message, e.g. "Access denied", "Insufficient permissions", "You don't have permission to view this organization's projects", "Account suspended".
      security:
      - BearerToken: []
      - ApiKeyAuth: []
