  responses:
    NotFound:
      content:
        application/json:
          example:
            error: File not found
          schema:
            $ref: "#/components/schemas/Error"
      description: |
        Resource not found. The **error** field contains the exact backend message, e.g. "File not found", "Project not found", "User not found", "Project not found or access denied", "Webhook not found", "Organization not found".
    FileNotFound:
      content:
        application/json:
          example:
            error: File not found
          schema:
            $ref: "#/components/schemas/Error"
      description: File not found (exact backend message for file/storage endpoints).
    ProjectNotFound:
      content:
        application/json:
          example:
            error: Project not found
          schema:
            $ref: "#/components/schemas/Error"
      description: Project not found (exact backend message for project endpoints).
    UserNotFound:
      content:
        application/json:
          example:
            error: User not found
          schema:
            $ref: "#/components/schemas/Error"
      description: User not found (exact backend message for user endpoints).
    OrganizationNotFound:
      content:
        application/json:
          example:
            error: Organization not found
          schema:
            $ref: "#/components/schemas/Error"
      description: Organization not found (exact backend message for org endpoints).
    WebhookNotFound:
      content:
        application/json:
          example:
            error: Webhook not found
          schema:
            $ref: "#/components/schemas/Error"
      description: Webhook not found (exact backend message for webhook endpoints).
    PaymentIntentNotFound:
      content:
        application/json:
          example:
            error: Payment intent not found
          schema:
            $ref: "#/components/schemas/Error"
      description: Payment intent not found (exact backend message for payment endpoints).
    SubscriptionNotFound:
      content:
        application/json:
          example:
            error: Subscription not found
          schema:
            $ref: "#/components/schemas/Error"
      description: Subscription not found (exact backend message for subscription
        endpoints).
    PaymentNotFound:
      content:
        application/json:
          example:
            error: Payment not found
          schema:
            $ref: "#/components/schemas/Error"
      description: Payment not found (exact backend message for payment admin endpoints).
    FunctionNotFound:
      content:
        application/json:
          example:
            error: Function not found
          schema:
            $ref: "#/components/schemas/Error"
      description: Function not found (exact backend message for functions endpoints).
    RoleNotFound:
      content:
        application/json:
          example:
            error: Role not found
          schema:
            $ref: "#/components/schemas/Error"
      description: Role not found (exact backend message for role-elevation endpoints).
    ProjectOrAccessDenied:
      content:
        application/json:
          example:
            error: Project not found or access denied
          schema:
            $ref: "#/components/schemas/Error"
      description: Project not found or access denied (exact backend message).
    Unauthorized:
      content:
        application/json:
          example:
            error: Invalid token.
          schema:
            $ref: "#/components/schemas/Error"
      description: |
        Not authenticated. The **error** field contains the exact backend message, e.g. "Invalid token.", "Access denied. No token provided.", "Authentication required", "Invalid API key", "API key expired".
    Forbidden:
      content:
        application/json:
          example:
            error: Access denied
          schema:
            $ref: "#/components/schemas/Error"
      description: |
        Access denied. The **error** field contains the exact backend message, e.g. "Access denied", "Insufficient permissions", "You don't have permission to view this organization's projects", "Account suspended".
    BadRequest:
      content:
        application/json:
          example:
            error: Validation failed
            details:
              email: Email is required
              password: Password must be at least 8 characters
          schema:
            $ref: "#/components/schemas/Error"
      description: |
        Bad request or validation error. The **error** field contains the exact backend message, e.g. "Validation failed", "projectId is required", "No file provided", "Invalid project ID format". **details** may contain validation errors when present.
    Conflict:
      content:
        application/json:
          example:
            error: Project with this slug already exists
          schema:
            $ref: "#/components/schemas/Error"
      description: "Resource conflict (e.g. \"Project with this slug already exists\"\
        , \"Webhook already succeeded\")."
    TooManyRequests:
      content:
        application/json:
          example:
            error: API key rate limit exceeded
          schema:
            $ref: "#/components/schemas/auth_register_429_response"
      description: |
        Rate limit exceeded. The **error** field contains the exact backend message, e.g. "API key rate limit exceeded", "Please wait before requesting another magic link".
    InternalServerError:
      content:
        application/json:
          example:
            error: Failed to upload file
          schema:
            $ref: "#/components/schemas/Error"
      description: |
        Server error. The **error** field contains the exact backend message, e.g. "Authentication failed", "Failed to upload file", "Failed to fetch project".
    ServiceUnavailable:
      content:
        application/json:
          example:
            error: Service temporarily unavailable. Please try again later.
            code: SERVICE_UNAVAILABLE
          schema:
            $ref: "#/components/schemas/Error"
      description: |
        Service temporarily unavailable. Returned when the organization is restricted (e.g. suspended due to unpaid overage,
        spend limit exceeded, or API usage limit reached). End-users see a generic message; the real reason is logged server-side only.
  schemas:
    RegisterRequest:
      description: "Request body for app user registration (email, password, name,\
        \ projectId)."
      properties:
        email:
          example: john.doe@mudbase.dev
          format: email
          type: string
        password:
          example: SecurePass123!
          minLength: 8
          type: string
        firstName:
          example: John
          type: string
        lastName:
          example: Doe
          type: string
        orgName:
          example: Mudbase
          type: string
      required:
      - email
      - firstName
      - lastName
      - password
      type: object
    LoginRequest:
      description: Credentials for local email/password sign-in (email and password).
      properties:
        email:
          example: john.doe@mudbase.dev
          format: email
          type: string
        password:
          example: SecurePass123!
          type: string
      required:
      - email
      - password
      type: object
    AuthResponse:
      description: "Response after successful login or registration (token, refreshToken,\
        \ user)."
      example:
        expiresIn: 0
        message: message
        user:
          lastName: lastName
          lastLogin: 2000-01-23T04:56:07.000+00:00
          role: owner
          org:
            name: name
            _id: _id
            slug: slug
          phoneVerified: true
          fullName: fullName
          avatar: avatar
          firstName: firstName
          emailVerified: true
          twoFactorEnabled: true
          createdAt: 2000-01-23T04:56:07.000+00:00
          _id: _id
          email: email
          updatedAt: 2000-01-23T04:56:07.000+00:00
        token: token
        refreshToken: refreshToken
      properties:
        message:
          type: string
        token:
          description: JWT access token (use in Authorization Bearer header)
          type: string
        refreshToken:
          description: JWT refresh token (use with POST /api/auth/refresh to get new
            token pair)
          type: string
        expiresIn:
          description: Access token TTL in seconds (e.g. 1800 for 30 minutes)
          type: integer
        user:
          $ref: "#/components/schemas/User"
      type: object
    SessionResponse:
      description: Current session with user and authenticated flag.
      properties:
        user:
          $ref: "#/components/schemas/User"
        authenticated:
          type: boolean
      type: object
    MagicLinkRequest:
      description: Email and projectId to send a passwordless magic link; optional
        redirectUrl.
      example:
        redirectUrl: redirectUrl
        projectId: projectId
        email: email
      properties:
        email:
          format: email
          type: string
        projectId:
          type: string
        redirectUrl:
          type: string
      required:
      - email
      - projectId
      type: object
    OTPSendRequest:
      description: Request to send OTP via SMS or email for the given project.
      example:
        method: sms
        phone: phone
        projectId: projectId
        email: email
      properties:
        phone:
          type: string
        email:
          format: email
          type: string
        projectId:
          type: string
        method:
          enum:
          - sms
          - email
          type: string
      required:
      - method
      - projectId
      type: object
    OTPVerifyRequest:
      description: OTP code and identifier (phone/email) for verification.
      example:
        identifier: identifier
        otp: otp
        projectId: projectId
      properties:
        identifier:
          type: string
        otp:
          type: string
        projectId:
          type: string
      required:
      - otp
      - projectId
      type: object
    User:
      description: "Authenticated user profile (id, email, name, roles, project access)."
      example:
        lastName: lastName
        lastLogin: 2000-01-23T04:56:07.000+00:00
        role: owner
        org:
          name: name
          _id: _id
          slug: slug
        phoneVerified: true
        fullName: fullName
        avatar: avatar
        firstName: firstName
        emailVerified: true
        twoFactorEnabled: true
        createdAt: 2000-01-23T04:56:07.000+00:00
        _id: _id
        email: email
        updatedAt: 2000-01-23T04:56:07.000+00:00
      properties:
        _id:
          type: string
        email:
          format: email
          type: string
        firstName:
          type: string
        lastName:
          type: string
        fullName:
          type: string
        avatar:
          type: string
        role:
          enum:
          - owner
          - admin
          - member
          - viewer
          type: string
        emailVerified:
          type: boolean
        phoneVerified:
          type: boolean
        twoFactorEnabled:
          type: boolean
        lastLogin:
          format: date-time
          type: string
        createdAt:
          format: date-time
          type: string
        updatedAt:
          format: date-time
          type: string
        org:
          $ref: "#/components/schemas/OrganizationSummary"
      type: object
    UpdateUserRequest:
      description: "Fields to update on the user profile (firstName, lastName, avatar)."
      example:
        firstName: firstName
        lastName: lastName
        avatar: avatar
      properties:
        firstName:
          type: string
        lastName:
          type: string
        avatar:
          type: string
      type: object
    ChangePasswordRequest:
