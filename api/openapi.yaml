        slug: mudbase-platform
        org: 685acbe0e129932fbb7a0fc3
        apiKey: pk_live_abc123xyz789
        createdAt: 2024-01-15T10:00:00.000Z
        updatedAt: 2024-01-15T10:00:00.000Z
    CollectionExample:
      value:
        _id: 685ada8fd9416ac02f171abf
