openapi: 3.0.3
info:
  contact:
    email: support@mudbase.dev
    name: MUDBASE Support
    url: https://mudbase.dev/support
  description: "MUDBASE is a scalable, real-time, and secure Backend-as-a-Service\
    \ (BaaS) platform \ndesigned for modern applications. Built with custom logic,\
    \ it offers fine-grained \ncontrol, extensibility, and enterprise-grade security.\n\
    \n## Features\n- 🔐 Multi-provider authentication (30+ OAuth providers)\n- 📊\
    \ Real-time database with collections\n- 📁 File storage and management\n- 🔑\
    \ API key management with permissions\n- 🔗 Webhook system with retry logic\n\
    - ⚡ Serverless functions\n- 💬 Multi-channel messaging (Push, Email, SMS)\n- 📈\
    \ Usage analytics and monitoring\n- 🌐 Real-time WebSocket events\n- 🔍 Full-text\
    \ search capabilities\n- 💳 Billing: Flutterwave only for fiat (platform subscriptions\
    \ + org payment processing with 7% + $0.50 split); crypto payment processor for\
    \ multi-chain checkout\n- 📡 Block-based multi-chain wallet monitoring (ETH/UTXO\
    \ scanners, GetBlock, scanner metrics API)\n"
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: MUDBASESDK
  version: 1.2.7
servers:
- description: Production server
  url: https://cloud.mudbase.dev
tags:
- description: User authentication and authorization
  name: auth
- description: User profile management
  name: users
- description: Database schema and collection management
  name: collections
- description: CRUD operations on collection data
  name: data
- description: "Buckets and file storage (buckets, files, upload, signed URLs)"
  name: storage
- description: Webhook configuration and logs
  name: webhooks
- description: Serverless function management
  name: functions
- description: "Push notifications, email, and SMS"
  name: messaging
- description: |
    Project-level usage and analytics. Use /api/usage/projects/{projectId} and /api/usage/trends. Org usage and overage are in the dashboard.
  name: usage
- description: Full-text search capabilities
  name: search
- description: |
    Cryptocurrency wallet management. Supports multiple chains (EVM, UTXO, Solana, Tron, TON, Cardano).
    **Production flow (non-custodial):** Register addresses (POST /api/wallet/non-custodial/register-address), get network fee (POST /api/wallet/estimate-network-fee or GET /api/wallet/fees), build and sign tx client-side, broadcast (POST /api/wallet/non-custodial/broadcast). Stuck EVM txs: GET replacement params (POST speed-up or cancel), sign and broadcast again.
    **Custodial endpoints (for testing only):** Create wallet (POST /api/wallet/create), get private key (GET /api/wallet/{walletId}/private-key), register that address in non-custodial, then use estimate-network-fee + broadcast to test the full flow. Custodial withdraw (POST /api/wallet/{walletId}/withdraw) returns a **semi-transaction** (signedTx, chain, fromAddress)—it does not broadcast; you broadcast it via POST /api/wallet/non-custodial/broadcast. Supports all platform chains/currencies. Transactions appear in the same transaction list and can be speed-up/canceled via nonce.
    **Network fee only:** POST /api/wallet/estimate-network-fee and POST /api/wallet/calculate-fee return **network fee only** (from blockchain). No platform or project fee in fee estimation. See docs/FEE_ARCHITECTURE.md.
  name: wallet
- description: |
    Billing and subscription management. Fiat via Flutterwave only (platform subscriptions + org payment processing with 7% + $0.50 split). Crypto checkout via multi-chain payment processor.
    Project checkout and subscription endpoints are documented here; org billing and overage are in the dashboard.
  name: billing
- description: Real-time chat and messaging
  name: chat
- description: Third-party service integrations
  name: integrations
- description: Ready-to-use multi-role system with pre-built templates and role-based
    signup
  name: multiRole
- description: Configurable role elevation with admin approval support
  name: roleElevation
- description: "Compliance automation and security event logging (GDPR, SOC 2)"
  name: compliance
- description: Real-time analytics and monitoring endpoints
  name: realtimeAnalytics
- description: System health and status
  name: health
paths:
  /api/auth/local/register:
    post:
      description: |
        When the project has **requireEmailVerification** enabled (default), the response is 201 with **requireVerification: true** and **no token**; the user must verify their email then sign in via login. When email verification is disabled, a token and refreshToken are returned.
      operationId: auth.register
      requestBody:
        content:
          application/json:
            example:
              email: sarah.chen@example.com
              password: SecurePass123!
              firstName: Sarah
              lastName: Chen
              projectId: 685ad30be129932fbb7a1047
            schema:
              $ref: "#/components/schemas/auth_register_request"
        description: "Registration payload (email, password, firstName, lastName,\
          \ projectId)."
        required: true
      responses:
        "201":
          content:
            application/json:
              examples:
                emailVerificationOn:
                  summary: Email verification ON (default) — no token until verified
                  value:
                    message: Check your email to verify your account
                    requireVerification: true
                emailVerificationOff:
                  summary: Email verification OFF — token returned immediately
                  value:
                    message: Registration successful
                    requireVerification: false
                    token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    expiresIn: 65051
                    user:
                      id: 685acbe0e129932fbb7a0fc2
                      email: john.doe@mudbase.dev
                      firstName: John
                      lastName: Doe
                      emailVerified: true
                      customRole: null
              schema:
                $ref: "#/components/schemas/auth_register_201_response"
          description: |
            When project.requireEmailVerification is on (default): no token returned; use requireVerification and message to prompt email verification, then user signs in via login. When off: token and refreshToken returned.
        "400":
          content:
            application/json:
              example:
                error: Validation failed
                details:
                  email: Email is required
                  password: Password must be at least 8 characters
              schema:
                $ref: "#/components/schemas/Error"
          description: |
            Bad request or validation error. The **error** field contains the exact backend message, e.g. "Validation failed", "projectId is required", "No file provided", "Invalid project ID format". **details** may contain validation errors when present.
        "401":
          content:
            application/json:
              example:
                error: Invalid token.
              schema:
                $ref: "#/components/schemas/Error"
          description: |
            Not authenticated. The **error** field contains the exact backend message, e.g. "Invalid token.", "Access denied. No token provided.", "Authentication required", "Invalid API key", "API key expired".
        "403":
          content:
            application/json:
              example:
                error: Access denied
              schema:
                $ref: "#/components/schemas/Error"
          description: |
            Access denied. The **error** field contains the exact backend message, e.g. "Access denied", "Insufficient permissions", "You don't have permission to view this organization's projects", "Account suspended".
        "404":
          content:
            application/json:
              example:
                error: Project not found
              schema:
                $ref: "#/components/schemas/Error"
          description: Project not found (exact backend message for project endpoints).
        "429":
          content:
            application/json:
              example:
                error: API key rate limit exceeded
              schema:
                $ref: "#/components/schemas/auth_register_429_response"
          description: |
            Rate limit exceeded. The **error** field contains the exact backend message, e.g. "API key rate limit exceeded", "Please wait before requesting another magic link".
        "500":
          content:
            application/json:
              example:
                error: Failed to upload file
              schema:
                $ref: "#/components/schemas/Error"
          description: |
            Server error. The **error** field contains the exact backend message, e.g. "Authentication failed", "Failed to upload file", "Failed to fetch project".
      security: []
      summary: Register new user
      tags:
      - auth
      x-display-name: Register User
      x-sdk-method: register
      x-content-type: application/json
      x-accepts:
      - application/json
  /api/auth/local/login:
    post:
      description: |
        When the project has **requireEmailVerification** enabled and the user has not verified their email, returns 403 with code **EMAIL_VERIFICATION_REQUIRED** (user must verify email first, then login again).
      operationId: auth.login
      requestBody:
        content:
          application/json:
            example:
              email: sarah.chen@example.com
              password: SecurePass123!
              projectId: 685ad30be129932fbb7a1047
            schema:
              $ref: "#/components/schemas/auth_login_request"
        description: "Login credentials (email, password) and project ID."
        required: true
      responses:
        "200":
          content:
            application/json:
              example:
                message: Login successful
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                expiresIn: 1800
                user:
                  id: 685acbe0e129932fbb7a0fc2
                  email: john.doe@mudbase.dev
                  firstName: John
                  lastName: Doe
                  role: developer
                  emailVerified: true
                  twoFactorEnabled: false
              schema:
                $ref: "#/components/schemas/auth_login_200_response"
          description: Login successful
        "400":
          content:
            application/json:
              example:
                error: Validation failed
                details:
                  email: Email is required
                  password: Password must be at least 8 characters
              schema:
                $ref: "#/components/schemas/Error"
          description: |
            Bad request or validation error. The **error** field contains the exact backend message, e.g. "Validation failed", "projectId is required", "No file provided", "Invalid project ID format". **details** may contain validation errors when present.
        "401":
          content:
            application/json:
              example:
                error: Invalid token.
              schema:
                $ref: "#/components/schemas/Error"
          description: |
            Not authenticated. The **error** field contains the exact backend message, e.g. "Invalid token.", "Access denied. No token provided.", "Authentication required", "Invalid API key", "API key expired".
        "403":
          content:
            application/json:
              example:
                error: Email verification required
                code: EMAIL_VERIFICATION_REQUIRED
                message: Please verify your email to sign in. Check your inbox for
                  the verification link.
              schema:
                $ref: "#/components/schemas/auth_login_403_response"
          description: Email verification required (project has requireEmailVerification
            and user has not verified)
        "429":
          content:
            application/json:
              example:
                error: API key rate limit exceeded
              schema:
                $ref: "#/components/schemas/auth_register_429_response"
          description: |
            Rate limit exceeded. The **error** field contains the exact backend message, e.g. "API key rate limit exceeded", "Please wait before requesting another magic link".
        "500":
          content:
            application/json:
              example:
                error: Failed to upload file
              schema:
                $ref: "#/components/schemas/Error"
          description: |
            Server error. The **error** field contains the exact backend message, e.g. "Authentication failed", "Failed to upload file", "Failed to fetch project".
      security: []
      summary: Login user
      tags:
      - auth
      x-display-name: Login User
      x-sdk-method: login
      x-content-type: application/json
      x-accepts:
      - application/json
  /api/auth/refresh:
    post:
      description: |
        Exchange a valid refresh token for a new JWT access token and refresh token.
        Works for both **organization** (platform/dashboard) and **app** auth; the same endpoint is used.
        The previous refresh token is invalidated (rotation). If the same refresh token is used again, the session is revoked (reuse detection).
      operationId: auth.refresh
      requestBody:
        content:
          application/json:
            example:
              refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
            schema:
              $ref: "#/components/schemas/auth_refresh_request"
        description: JSON body containing the refresh token to exchange for a new
          access token and refresh token (token rotation).
        required: true
      responses:
        "200":
          content:
            application/json:
              example:
                message: Token refreshed successfully
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                expiresIn: 1800
              schema:
                $ref: "#/components/schemas/auth_refresh_200_response"
          description: New token pair issued
        "400":
          content:
            application/json:
              example:
                error: Refresh token is required
              schema:
                $ref: "#/components/schemas/auth_refresh_400_response"
          description: Missing refresh token
        "401":
          content:
            application/json:
              example:
                error: Invalid or expired refresh token
              schema:
                $ref: "#/components/schemas/auth_refresh_400_response"
          description: Invalid or expired refresh token (or reuse detected)
      security: []
      summary: Refresh access token (org and project)
      tags:
      - auth
      x-display-name: Refresh Token
      x-sdk-method: refresh
      x-content-type: application/json
      x-accepts:
      - application/json
  /api/auth/local/logout:
    post:
      description: |
        Logout the current authenticated user session.
        Requires JWT Bearer token (BearerToken). API keys are not supported for this endpoint.
      operationId: auth.logout
      responses:
        "200":
          content:
            application/json:
              example:
                message: Logout successful
              schema:
                $ref: "#/components/schemas/MessageResponse"
          description: Logout successful
        "400":
          content:
            application/json:
              example:
                error: Validation failed
                details:
                  email: Email is required
                  password: Password must be at least 8 characters
              schema:
                $ref: "#/components/schemas/Error"
          description: |
            Bad request or validation error. The **error** field contains the exact backend message, e.g. "Validation failed", "projectId is required", "No file provided", "Invalid project ID format". **details** may contain validation errors when present.
        "401":
          content:
            application/json:
              example:
                error: Invalid token.
              schema:
                $ref: "#/components/schemas/Error"
          description: |
            Not authenticated. The **error** field contains the exact backend message, e.g. "Invalid token.", "Access denied. No token provided.", "Authentication required", "Invalid API key", "API key expired".
        "403":
          content:
            application/json:
              example:
                error: Access denied
              schema:
                $ref: "#/components/schemas/Error"
          description: |
            Access denied. The **error** field contains the exact backend message, e.g. "Access denied", "Insufficient permissions", "You don't have permission to view this organization's projects", "Account suspended".
      security:
      - BearerToken: []
      summary: Logout user
      tags:
      - auth
      x-display-name: Logout user
      x-sdk-method: logout
      x-accepts:
      - application/json
  /api/auth/local/session:
    get:
      description: |
        Get the current authenticated user session.
        Requires JWT Bearer token (BearerToken). API keys are not supported for this endpoint.
      operationId: auth.getSession
      parameters:
      - description: Project ID to get session for.
        explode: true
        in: query
        name: projectId
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
                user:
                  id: 685acbe0e129932fbb7a0fc2
                  email: john.doe@mudbase.dev
                  firstName: John
                  lastName: Doe
                  project:
                    id: 685ad30be129932fbb7a1047
                    name: Mudbase Platform
                    role: developer
                authenticated: true
              schema:
                $ref: "#/components/schemas/auth_getSession_200_response"
          description: Current session
        "401":
          content:
            application/json:
              example:
                error: Invalid token.
              schema:
                $ref: "#/components/schemas/Error"
          description: |
            Not authenticated. The **error** field contains the exact backend message, e.g. "Invalid token.", "Access denied. No token provided.", "Authentication required", "Invalid API key", "API key expired".
        "404":
          content:
            application/json:
              example:
                error: Project not found
              schema:
                $ref: "#/components/schemas/Error"
          description: Project not found (exact backend message for project endpoints).
      security:
      - BearerToken: []
      summary: Get current session
      tags:
      - auth
      x-display-name: Get Session
      x-sdk-method: getSession
      x-accepts:
      - application/json
  /api/auth/local/password-reset:
    post:
      description: |
        When projectId is provided, sends a 6-digit OTP to the user's email (app reset uses OTP, not link).
        When projectId is omitted, sends a token link (org/platform local account). Rate limited.
      operationId: auth.requestPasswordReset
      requestBody:
        content:
          application/json:
            example:
              email: user@example.com
              projectId: 685ad30be129932fbb7a1047
            schema:
              $ref: "#/components/schemas/auth_requestPasswordReset_request"
        description: Email and optional projectId for app OTP or org token link.
        required: true
      responses:
        "200":
          content:
            application/json:
              example:
                message: "If an account exists, a verification code has been sent\
                  \ to your email"
              schema:
                $ref: "#/components/schemas/MessageResponse"
          description: OTP or reset email sent (generic message to prevent enumeration)
        "400":
          content:
            application/json:
              example:
                error: Validation failed
                details:
                  email: Email is required
                  password: Password must be at least 8 characters
              schema:
                $ref: "#/components/schemas/Error"
          description: |
            Bad request or validation error. The **error** field contains the exact backend message, e.g. "Validation failed", "projectId is required", "No file provided", "Invalid project ID format". **details** may contain validation errors when present.
        "401":
          content:
            application/json:
              example:
                error: Invalid token.
              schema:
                $ref: "#/components/schemas/Error"
          description: |
            Not authenticated. The **error** field contains the exact backend message, e.g. "Invalid token.", "Access denied. No token provided.", "Authentication required", "Invalid API key", "API key expired".
        "403":
          content:
            application/json:
              example:
                error: Access denied
              schema:
                $ref: "#/components/schemas/Error"
          description: |
            Access denied. The **error** field contains the exact backend message, e.g. "Access denied", "Insufficient permissions", "You don't have permission to view this organization's projects", "Account suspended".
        "404":
          content:
            application/json:
              example:
                error: Project not found
              schema:
                $ref: "#/components/schemas/Error"
          description: Project not found (exact backend message for project endpoints).
        "429":
          description: Too many requests (rate limit)
        "500":
          content:
            application/json:
              example:
                error: Failed to upload file
              schema:
                $ref: "#/components/schemas/Error"
          description: |
            Server error. The **error** field contains the exact backend message, e.g. "Authentication failed", "Failed to upload file", "Failed to fetch project".
      security: []
      summary: Request password reset (OTP)
      tags:
      - auth
      x-display-name: Request Password Reset
      x-sdk-method: requestPasswordReset
      x-content-type: application/json
      x-accepts:
      - application/json
  /api/auth/local/password-reset/confirm:
    post:
      description: |
        Set new password using the OTP sent to the user's email. Call after
        POST /api/auth/local/password-reset with projectId. Rate limited (OTP limit).
        If the user's email was not yet verified, it is marked as verified upon successful reset.
      operationId: auth.confirmPasswordReset
      requestBody:
        content:
          application/json:
            example:
              email: user@example.com
              projectId: 685ad30be129932fbb7a1047
              otp: "123456"
              newPassword: NewSecurePass123!
            schema:
              $ref: "#/components/schemas/auth_confirmPasswordReset_request"
        description: "Email, projectId, OTP code, and new password."
        required: true
      responses:
        "200":
          content:
            application/json:
              example:
                message: Password reset successful
              schema:
                $ref: "#/components/schemas/MessageResponse"
          description: Password reset successful
        "400":
          description: "Invalid or expired OTP, or validation error"
        "401":
          content:
            application/json:
              example:
                error: Invalid token.
              schema:
                $ref: "#/components/schemas/Error"
          description: |
            Not authenticated. The **error** field contains the exact backend message, e.g. "Invalid token.", "Access denied. No token provided.", "Authentication required", "Invalid API key", "API key expired".
        "403":
          content:
            application/json:
              example:
                error: Access denied
              schema:
                $ref: "#/components/schemas/Error"
          description: |
            Access denied. The **error** field contains the exact backend message, e.g. "Access denied", "Insufficient permissions", "You don't have permission to view this organization's projects", "Account suspended".
        "404":
          content:
            application/json:
              example:
                error: File not found
              schema:
                $ref: "#/components/schemas/Error"
          description: |
            Resource not found. The **error** field contains the exact backend message, e.g. "File not found", "Project not found", "User not found", "Project not found or access denied", "Webhook not found", "Organization not found".
        "429":
          description: Too many attempts (rate limit)
        "500":
          content:
            application/json:
              example:
                error: Failed to upload file
              schema:
                $ref: "#/components/schemas/Error"
          description: |
            Server error. The **error** field contains the exact backend message, e.g. "Authentication failed", "Failed to upload file", "Failed to fetch project".
      security: []
      summary: Confirm password reset with OTP
      tags:
      - auth
      x-display-name: Confirm password reset with OTP
      x-sdk-method: confirmPasswordReset
      x-content-type: application/json
      x-accepts:
      - application/json
  /api/auth/local/password-reset/{token}:
    post:
      description: |
        Legacy token-based completion. Prefer OTP flow: use POST .../password-reset/confirm
        with the OTP sent to email for app resets.
      operationId: auth.resetPassword
      parameters:
      - description: Password reset token from email link.
        explode: false
        in: path
        name: token
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            example:
              password: NewSecurePass123!
              projectId: 685ad30be129932fbb7a1047
            schema:
              $ref: "#/components/schemas/auth_resetPassword_request"
        description: New password and optional projectId.
        required: true
      responses:
        "200":
          content:
            application/json:
              example:
                message: Password reset successful
              schema:
                $ref: "#/components/schemas/MessageResponse"
          description: Password reset successful
        "400":
          content:
            application/json:
              example:
                error: Validation failed
                details:
                  email: Email is required
                  password: Password must be at least 8 characters
              schema:
                $ref: "#/components/schemas/Error"
          description: |
            Bad request or validation error. The **error** field contains the exact backend message, e.g. "Validation failed", "projectId is required", "No file provided", "Invalid project ID format". **details** may contain validation errors when present.
        "401":
          content:
            application/json:
              example:
                error: Invalid token.
              schema:
                $ref: "#/components/schemas/Error"
          description: |
            Not authenticated. The **error** field contains the exact backend message, e.g. "Invalid token.", "Access denied. No token provided.", "Authentication required", "Invalid API key", "API key expired".
        "403":
          content:
            application/json:
              example:
                error: Access denied
              schema:
                $ref: "#/components/schemas/Error"
          description: |
            Access denied. The **error** field contains the exact backend message, e.g. "Access denied", "Insufficient permissions", "You don't have permission to view this organization's projects", "Account suspended".
        "500":
          content:
            application/json:
              example:
                error: Failed to upload file
              schema:
                $ref: "#/components/schemas/Error"
          description: |
            Server error. The **error** field contains the exact backend message, e.g. "Authentication failed", "Failed to upload file", "Failed to fetch project".
      security: []
      summary: Reset password with token (legacy)
      tags:
      - auth
      x-display-name: Reset Password
      x-sdk-method: resetPassword
      x-content-type: application/json
      x-accepts:
      - application/json
  /api/auth/oauth/{provider}/{projectId}:
    get:
      description: |
        Initiates OAuth authentication flow for a specified provider and project.
        The OAuth provider must be configured and enabled for the project first.
        After user authentication, redirects to the OAuth provider's consent screen.
      operationId: auth.oauthInitiate
      parameters:
      - description: "OAuth provider identifier (e.g. google, github)."
        example: google
        explode: false
        in: path
        name: provider
        required: true
        schema:
          enum:
          - google
          - github
          - facebook
          - microsoft
          - apple
          - twitter
          - discord
          - linkedin
          - dropbox
          - slack
          - reddit
          - twitch
          - figma
          - zoom
          - bitbucket
          - salesforce
          - shopify
          - line
          - spotify
          - strava
          - paypal
          - asana
          - trello
          - okta
          - gitea
          - yandex
          - yahoo
          - vk
          - meetup
          type: string
        style: simple
      - description: Project ID for which OAuth is configured.
        explode: false
        in: path
        name: projectId
        required: true
        schema:
          example: 685ad30be129932fbb7a1047
          type: string
        style: simple
      - description: The URL to redirect to after authentication. Must be pre-registered
          in project settings.
