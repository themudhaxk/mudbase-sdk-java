    post:
      description: |
        Create a new serverless function. Trigger types: http, document, file, webhook, wallet, cron, messaging.
        Sandbox utilities available: db, files, messaging, wallet, utils, env, console.
      operationId: functions.create
      parameters:
      - description: Project ID.
        explode: false
        in: path
        name: projectId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            examples:
              documentTrigger:
                summary: Document create trigger
                value:
                  name: OnUserCreate
                  description: Process new users
                  code: |
                    const count = await db.find('users', payload.document?.data ? { email: payload.document.data.email } : {});
                    return { found: count.length };
                  trigger:
                    type: document
                    event: create
                    collectionId: 685ada8fd9416ac02f171abf
                  environment:
                    DEBUG: "true"
              webhookTrigger:
                summary: Webhook trigger
                value:
                  name: HandleWebhook
                  code: |
                    return { received: payload.webhook?.body || payload };
                  trigger:
                    type: webhook
                    event: received
              cronTrigger:
                summary: Scheduled (cron) trigger
                value:
                  name: DailyReport
                  code: |
                    return { ran: new Date().toISOString() };
                  trigger:
                    type: cron
                    schedule: daily
              httpTrigger:
                summary: HTTP trigger
                value:
                  name: HttpWebhook
                  code: |
                    // payload.webhook contains headers/body for incoming HTTP
                    return { headers: payload.webhook?.headers || {}, body: payload.webhook?.body || {} };
                  trigger:
                    type: http
                    path: "/projects/{projectId}/webhooks/custom"
                    method: POST
              fileTrigger:
                summary: File trigger
                value:
                  name: ProcessFileUpload
                  code: |
                    const meta = payload.file || {};
                    // Example: fetch metadata and return id
                    const md = await files.getMetadata(meta.fileId).catch(()=>null);
                    return { fileId: meta.fileId, metadata: md };
                  trigger:
                    type: file
                    event: uploaded
              walletTrigger:
                summary: Wallet transaction trigger
                value:
                  name: OnWalletTx
                  code: |
                    const w = payload.wallet || {};
                    const tx = w.transaction || {};
                    // Example: log tx hash and amount
                    return { txHash: tx.txHash || w.txHash, amount: tx.amount || null };
                  trigger:
                    type: wallet
                    event: tx
              messagingTrigger:
                summary: Messaging trigger
                value:
                  name: OnMessageSent
                  code: |
                    const msg = payload.message || {};
                    // Example: forward message summary to ops via email
                    await messaging.sendEmail({ to: 'ops@mudbase.dev', subject: 'New message', html: `<pre>${JSON.stringify(msg, null, 2)}</pre>` }).catch(()=>null);
                    return { notified: true, messageId: msg.messageId };
                  trigger:
                    type: messaging
                    event: sent
              customCronTrigger:
                summary: Custom cron expression
                value:
                  name: HourlyCleanup
                  code: |
                    // runs hourly
                    return { cleaned: true, at: new Date().toISOString() };
                  trigger:
                    type: cron
                    schedule: 0 * * * *
            schema:
              $ref: "#/components/schemas/CreateFunctionRequest"
        description: "Function name, description, code, trigger config, and optional\
          \ environment."
        required: true
      responses:
        "201":
          content:
            application/json:
              examples:
                created:
                  summary: Function created
                  value:
                    success: true
                    data:
                      _id: 685af8b85d73a104065b6a77
                      name: OnUserCreate
                      trigger:
                        type: document
                        event: create
                        collectionId: 685ada8fd9416ac02f171abf
                      project: 685ad30be129932fbb7a1047
                      isActive: true
                      versions:
                      - version: 1
