          $ref: "#/components/schemas/wallet_getCancelParams_200_response_data"
      type: object
    wallet_estimateGas_request_transaction:
      description: |
        Required for EVM chains. Optional for non-EVM (ignored). Supports 1) Token transfer { from, tokenAddress, to, amount }, 2) Native transfer { from, to, value }, 3) Raw { from, to, value, data }.
      properties:
        from:
          description: Sender address
          example: 0x742d35Cc6634C0532925a3b844Bc454e4438f44e
          type: string
        to:
          description: |
            For native transfers: recipient address.
            For token transfers: recipient address (tokenAddress must be provided separately).
            For raw format: contract or recipient address.
          example: 0x53d284357ec70cE289D6D64134DfAc8E511c8a3D
          type: string
        value:
          description: |
            Amount in native currency (ETH/BNB/MATIC).
            Can be provided as decimal string (e.g., "1.0") or wei string.
            Required for native transfers.
          example: "1.0"
          type: string
        data:
          description: |
            Raw transaction data (hex string starting with 0x).
            Used for raw format or contract calls.
            For token transfers, this is auto-generated from tokenAddress, to, and amount.
          example: 0xa9059cbb000000000000000000000000...
          type: string
        tokenAddress:
          description: |
            Token contract address (for token transfers).
            When provided with 'amount', automatically encodes the transfer.
          example: 0xdAC17F958D2ee523a2206206994597C13D831ec7
          type: string
        amount:
          description: |
            Token amount in human-readable format (e.g., "1.0" for 1 token).
            Used with tokenAddress for user-friendly token transfers.
            Automatically converted to token units based on token decimals.
          example: "1.0"
          type: string
      required:
      - from
      type: object
    wallet_estimateGas_request:
      properties:
        chain:
          description: "Chain id. For EVM, transaction is required. For non-EVM (UTXO,\
            \ Solana, Tron, TON, Cardano) only chain is needed."
          enum:
          - ethereum
          - binance
          - bsc
          - polygon
          - arbitrum
          - optimism
          - base
          - avalanche
          - celo
          - bitcoin
          - litecoin
          - dogecoin
          - solana
          - tron
          - ton
          - cardano
          type: string
        transaction:
