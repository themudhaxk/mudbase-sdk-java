                amount: 100
                currency: USD
                status: successful
                customer:
                  email: customer@example.com
                  name: John Doe
                meta:
                  orgId: 65a1b2c3d4e5f6789012345a
                  projectId: 65a1b2c3d4e5f6789012345b
